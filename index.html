<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>篮球生涯骰子</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #0c0c2e 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px 15px 80px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0, 20, 40, 0.9);
            border-radius: 12px;
            padding: 15px;
            border: 2px solid #0066cc;
        }
        .status-item {
            text-align: center;
        }
        .status-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .status-value {
            font-size: 20px;
            font-weight: bold;
        }
        .stamina-value { color: #4cd964; }
        .money-value { color: #ffcc00; }
        .wins-value { color: #5ac8fa; }
        
        /* 游戏信息 */
        .game-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .day-counter {
            font-size: 18px;
            text-align: center;
            margin-bottom: 10px;
        }
        .games-progress {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #aaa;
        }
        .progress-text {
            color: #ffcc00;
        }
        
        /* 属性面板 */
        .attributes-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .section-title {
            font-size: 16px;
            color: #ffcc00;
            margin-bottom: 15px;
            text-align: center;
        }
        .attributes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .attribute {
            background: rgba(0, 30, 60, 0.7);
            border-radius: 8px;
            padding: 12px;
            position: relative;
        }
        .attr-name {
            font-size: 13px;
            color: #fff;
            margin-bottom: 5px;
        }
        .attr-level {
            font-size: 20px;
            color: #ffcc00;
            text-align: center;
        }
        .attr-dice {
            position: absolute;
            right: 8px;
            top: 8px;
            background: #ff6b00;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* 决策面板 */
        .decision-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .decision-title {
            text-align: center;
            font-size: 18px;
            color: #ffdd00;
            margin-bottom: 10px;
        }
        .decision-subtitle {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option {
            background: rgba(0, 30, 60, 0.7);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .option:hover, .option:active {
            transform: translateY(-2px);
            border-color: #ff6b00;
        }
        .option-type {
            display: inline-block;
            padding: 3px 8px;
            background: #ff6b00;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 8px;
        }
        .training-type { background: #4cd964; }
        .business-type { background: #5ac8fa; }
        .rest-type { background: #ff9500; }
        .option-name {
            font-size: 14px;
            color: #fff;
            margin-bottom: 5px;
        }
        .option-cost, .option-gain {
            font-size: 12px;
            margin-bottom: 3px;
        }
        .cost-value { color: #ff6b00; }
        .gain-value { color: #4cd964; }
        
        /* 骰子面板 */
        .dice-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }
        .dice-container {
            text-align: center;
        }
        .dice-result {
            font-size: 32px;
            color: #ffcc00;
            margin: 20px 0;
            min-height: 40px;
        }
        .dice-value {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
        }
        .target-value {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 20px;
        }
        .dice-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff6b00, #ff9500);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dice-button:hover, .dice-button:active {
            transform: scale(1.05);
        }
        
        /* 日志面板 */
        .log-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .log-title {
            font-size: 16px;
            color: #ffcc00;
            margin-bottom: 10px;
            text-align: center;
        }
        #eventLog {
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.4;
        }
        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .log-train { color: #4cd964; }
        .log-business { color: #5ac8fa; }
        .log-rest { color: #ff9500; }
        .log-game { color: #ff3b30; }
        .log-important { color: #ffdd00; font-weight: bold; }
        
        /* 游戏结束弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a3e, #0c0c2e);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 3px solid #ff6b00;
        }
        .modal-title {
            font-size: 24px;
            color: #ffdd00;
            margin-bottom: 20px;
        }
        .modal-message {
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .modal-button {
            background: linear-gradient(45deg, #ff6b00, #ff9500);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        /* 工具类 */
        .hidden { display: none; }
        
        /* 响应式调整 */
        @media (max-width: 375px) {
            .attributes-grid { grid-template-columns: 1fr; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <div class="status-label">体力</div>
            <div id="staminaValue" class="status-value stamina-value">100/100</div>
        </div>
        <div class="status-item">
            <div class="status-label">金钱</div>
            <div id="moneyValue" class="status-value money-value">5000</div>
        </div>
        <div class="status-item">
            <div class="status-label">胜场</div>
            <div id="winsValue" class="status-value wins-value">0/12</div>
        </div>
    </div>
    
    <!-- 游戏信息 -->
    <div class="game-info">
        <div class="day-counter">第 <span id="currentDay">1</span> 天</div>
        <div class="games-progress">
            <span>常规赛进度</span>
            <span id="gamesProgress" class="progress-text">0/12</span>
        </div>
    </div>
    
    <!-- 属性面板 -->
    <div class="attributes-panel">
        <div class="section-title">球员能力</div>
        <div class="attributes-grid">
            <div class="attribute">
                <div class="attr-name">翻身跳投</div>
                <div class="attr-level">Lv.<span id="levelJumpShot">1</span></div>
                <div class="attr-dice" id="diceJumpShot">1D6</div>
            </div>
            <div class="attribute">
                <div class="attr-name">突破劈扣</div>
                <div class="attr-level">Lv.<span id="levelDrive">1</span></div>
                <div class="attr-dice" id="diceDrive">1D6</div>
            </div>
            <div class="attribute">
                <div class="attr-name">追身大帽</div>
                <div class="attr-level">Lv.<span id="levelBlock">1</span></div>
                <div class="attr-dice" id="diceBlock">1D6</div>
            </div>
            <div class="attribute">
                <div class="attr-name">接球快攻</div>
                <div class="attr-level">Lv.<span id="levelFastBreak">1</span></div>
                <div class="attr-dice" id="diceFastBreak">1D6</div>
            </div>
        </div>
    </div>
    
    <!-- 决策面板 -->
    <div class="decision-panel" id="decisionPanel">
        <div class="decision-title">今日安排</div>
        <div class="decision-subtitle">选择一个行动</div>
        <div class="options-grid">
            <div class="option" onclick="selectDecision('trainA')">
                <div class="option-type training-type">训练</div>
                <div class="option-name" id="trainAName">专项训练A</div>
                <div class="option-cost">消耗: <span id="trainACost" class="cost-value">300金+20体</span></div>
                <div class="option-gain">目标: <span id="trainATarget" class="gain-value">掷骰≥4</span></div>
            </div>
            <div class="option" onclick="selectDecision('trainB')">
                <div class="option-type training-type">训练</div>
                <div class="option-name" id="trainBName">专项训练B</div>
                <div class="option-cost">消耗: <span id="trainBCost" class="cost-value">300金+20体</span></div>
                <div class="option-gain">目标: <span id="trainBTarget" class="gain-value">掷骰≥4</span></div>
            </div>
            <div class="option" onclick="selectDecision('business')">
                <div class="option-type business-type">商业</div>
                <div class="option-name">商业活动</div>
                <div class="option-cost">消耗: <span id="businessCost" class="cost-value">20体</span></div>
                <div class="option-gain">获得: <span id="businessGain" class="gain-value">500金</span></div>
            </div>
            <div class="option" onclick="selectDecision('rest')">
                <div class="option-type rest-type">休息</div>
                <div class="option-name">休息恢复</div>
                <div class="option-cost">消耗: <span id="restCost" class="cost-value">200金</span></div>
                <div class="option-gain">恢复: <span id="restGain" class="gain-value">30体</span></div>
            </div>
        </div>
    </div>
    
    <!-- 骰子面板 -->
    <div class="dice-panel" id="dicePanel">
        <div class="dice-container">
            <div class="dice-result" id="diceResultDesc"></div>
            <div class="dice-value" id="diceValue">?</div>
            <div class="target-value" id="targetInfo">目标值: 4</div>
            <button class="dice-button" onclick="rollDice()">掷骰子</button>
        </div>
    </div>
    
    <!-- 日志面板 -->
    <div class="log-panel">
        <div class="log-title">训练日志</div>
        <div id="eventLog">
            <div class="log-entry log-important">欢迎来到篮球生涯骰子！</div>
            <div class="log-entry">选择今日行动，每3天进行一场常规赛。</div>
            <div class="log-entry">赢得12胜即可获得季后赛资格。</div>
        </div>
    </div>
    
    <!-- 游戏结束弹窗 -->
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title" id="gameOverTitle">赛季结束</div>
            <div class="modal-message" id="gameOverMessage"></div>
            <button class="modal-button" onclick="restartGame()">重新开始</button>
        </div>
    </div>
    
    <script>
        // ===== 游戏状态 =====
        const gameState = {
            day: 1,
            stamina: 100,
            maxStamina: 100,
            money: 5000,
            wins: 0,
            gamesPlayed: 0,
            trainingTarget: 4,  // 训练目标值
            gameTarget: 3,      // 比赛目标值
            
            attributes: {
                jumpShot: { name: "翻身跳投", level: 1, diceCount: 1 },
                drive: { name: "突破劈扣", level: 1, diceCount: 1 },
                block: { name: "追身大帽", level: 1, diceCount: 1 },
                fastBreak: { name: "接球快攻", level: 1, diceCount: 1 }
            },
            
            // 今日决策选项
            decisions: {
                trainA: { type: "train", attr: "jumpShot", costMoney: 300, costStamina: 20 },
                trainB: { type: "train", attr: "drive", costMoney: 300, costStamina: 20 },
                business: { type: "business", costStamina: 20, gainMoney: 500 },
                rest: { type: "rest", costMoney: 200, gainStamina: 30 }
            },
            
            // 当前选择的决策
            selectedDecision: null
        };

        // 属性名映射
        const attrNames = {
            jumpShot: "翻身跳投",
            drive: "突破劈扣",
            block: "追身大帽",
            fastBreak: "接球快攻"
        };

        // ===== 游戏初始化 =====
        function initGame() {
            // 生成今日决策选项
            generateDailyDecisions();
            updateUI();
            addLog("篮球生涯开始！每天选择一项行动。", "important");
        }

        // 生成每日决策选项
        function generateDailyDecisions() {
            const allAttrs = ["jumpShot", "drive", "block", "fastBreak"];
            
            // 随机选择两个不同属性
            const shuffled = [...allAttrs].sort(() => Math.random() - 0.5);
            
            // 训练选项A
            const attrA = shuffled[0];
            const costMoneyA = 200 + Math.floor(Math.random() * 200);
            const costStaminaA = 15 + Math.floor(Math.random() * 10);
            
            gameState.decisions.trainA = {
                type: "train",
                attr: attrA,
                costMoney: costMoneyA,
                costStamina: costStaminaA
            };
            
            // 训练选项B
            const attrB = shuffled[1];
            const costMoneyB = 200 + Math.floor(Math.random() * 200);
            const costStaminaB = 15 + Math.floor(Math.random() * 10);
            
            gameState.decisions.trainB = {
                type: "train",
                attr: attrB,
                costMoney: costMoneyB,
                costStamina: costStaminaB
            };
            
            // 商业选项
            const costStaminaBus = 20 + Math.floor(Math.random() * 10);
            const gainMoneyBus = 400 + Math.floor(Math.random() * 200);
            
            gameState.decisions.business = {
                type: "business",
                costStamina: costStaminaBus,
                gainMoney: gainMoneyBus
            };
            
            // 休息选项
            const costMoneyRest = 150 + Math.floor(Math.random() * 100);
            const gainStaminaRest = 25 + Math.floor(Math.random() * 10);
            
            gameState.decisions.rest = {
                type: "rest",
                costMoney: costMoneyRest,
                gainStamina: gainStaminaRest
            };
            
            // 更新显示
            updateDecisionDisplay();
        }

        // 更新决策显示
        function updateDecisionDisplay() {
            const d = gameState.decisions;
            
            // 训练A
            document.getElementById('trainAName').textContent = attrNames[d.trainA.attr];
            document.getElementById('trainACost').textContent = `${d.trainA.costMoney}金+${d.trainA.costStamina}体`;
            document.getElementById('trainATarget').textContent = `掷骰≥${gameState.trainingTarget}`;
            
            // 训练B
            document.getElementById('trainBName').textContent = attrNames[d.trainB.attr];
            document.getElementById('trainBCost').textContent = `${d.trainB.costMoney}金+${d.trainB.costStamina}体`;
            document.getElementById('trainBTarget').textContent = `掷骰≥${gameState.trainingTarget}`;
            
            // 商业
            document.getElementById('businessCost').textContent = `${d.business.costStamina}体`;
            document.getElementById('businessGain').textContent = `${d.business.gainMoney}金`;
            
            // 休息
            document.getElementById('restCost').textContent = `${d.rest.costMoney}金`;
            document.getElementById('restGain').textContent = `${d.rest.gainStamina}体`;
        }

        // ===== 决策选择 =====
        function selectDecision(decisionId) {
            const decision = gameState.decisions[decisionId];
            
            // 检查资源
            if (decision.type === "train" || decision.type === "business") {
                if (gameState.stamina < decision.costStamina) {
                    addLog(`体力不足！需要${decision.costStamina}体力。`, "important");
                    return;
                }
            }
            
            if (decision.type === "train" && gameState.money < decision.costMoney) {
                addLog(`金钱不足！需要${decision.costMoney}金钱。`, "important");
                return;
            }
            
            if (decision.type === "rest" && gameState.money < decision.costMoney) {
                addLog(`金钱不足！需要${decision.costMoney}金钱。`, "important");
                return;
            }
            
            gameState.selectedDecision = { id: decisionId, ...decision };
            
            if (decision.type === "train") {
                // 显示骰子面板
                document.getElementById('decisionPanel').style.display = 'none';
                document.getElementById('dicePanel').style.display = 'block';
                
                const attrName = attrNames[decision.attr];
                document.getElementById('diceResultDesc').textContent = `${attrName}训练`;
                document.getElementById('targetInfo').textContent = `目标值: ${gameState.trainingTarget} (≥通过)`;
                
            } else {
                // 直接执行商业或休息
                executeDecision();
            }
        }

        // ===== 骰子系统 =====
        function rollDice() {
            if (!gameState.selectedDecision) return;
            
            const decision = gameState.selectedDecision;
            const attr = gameState.attributes[decision.attr];
            
            // 掷骰子
            let diceResult = 0;
            let diceValues = [];
            
            for (let i = 0; i < attr.diceCount; i++) {
                const roll = Math.floor(Math.random() * 6) + 1;
                diceValues.push(roll);
                diceResult += roll;
            }
            
            const isSuccess = diceResult >= gameState.trainingTarget;
            
            // 显示结果
            document.getElementById('diceValue').textContent = diceResult;
            if (diceValues.length > 1) {
                document.getElementById('diceValue').textContent += ` (${diceValues.join('+')})`;
            }
            
            // 更新资源
            gameState.stamina -= decision.costStamina;
            gameState.money -= decision.costMoney;
            
            // 计算经验
            let expGain = 20; // 基础经验
            let extraCost = 0;
            
            if (isSuccess) {
                expGain = 30; // 成功获得更多经验
                addLog(`${attrNames[decision.attr]}训练成功！掷出${diceResult}，获得${expGain}经验。`, "train");
            } else {
                expGain = 10; // 失败获得较少经验
                extraCost = 10; // 额外体力消耗
                gameState.stamina -= extraCost;
                addLog(`${attrNames[decision.attr]}训练失败。掷出${diceResult}，仅获${expGain}经验，额外消耗${extraCost}体力。`, "train");
            }
            
            // 属性升级逻辑
            const level = attr.level;
            const expNeeded = level * 100;
            
            // 简单经验系统：每100经验升一级
            if (Math.random() < 0.3) { // 30%几率升级
                attr.level++;
                attr.diceCount++; // 升级增加一个骰子
                addLog(`🎉 ${attrNames[decision.attr]} 提升到 ${attr.level} 级！获得一个骰子。`, "important");
            }
            
            // 完成行动
            finishDecision();
        }

        // 执行决策
        function executeDecision() {
            const decision = gameState.selectedDecision;
            
            switch (decision.type) {
                case "business":
                    gameState.stamina -= decision.costStamina;
                    gameState.money += decision.gainMoney;
                    addLog(`商业活动完成，消耗${decision.costStamina}体力，获得${decision.gainMoney}金钱。`, "business");
                    break;
                    
                case "rest":
                    gameState.money -= decision.costMoney;
                    gameState.stamina = Math.min(gameState.maxStamina, gameState.stamina + decision.gainStamina);
                    addLog(`休息恢复，消耗${decision.costMoney}金钱，恢复${decision.gainStamina}体力。`, "rest");
                    break;
            }
            
            finishDecision();
        }

        // 完成决策
        function finishDecision() {
            // 更新界面
            updateUI();
            
            // 每10天提高训练目标
            if (gameState.day % 10 === 0) {
                gameState.trainingTarget += 4;
                addLog(`训练难度提升！目标值调整为${gameState.trainingTarget}。`, "important");
            }
            
            // 检查是否比赛日
            if (gameState.day % 3 === 0) {
                setTimeout(playRegularGame, 500);
            } else {
                // 进入下一天
                nextDay();
            }
        }

        // 进入下一天
        function nextDay() {
            gameState.day++;
            gameState.selectedDecision = null;
            
            // 显示决策面板
            document.getElementById('decisionPanel').style.display = 'block';
            document.getElementById('dicePanel').style.display = 'none';
            
            // 生成新决策
            generateDailyDecisions();
            updateUI();
            
            addLog(`进入第${gameState.day}天。`, "important");
            
            // 检查游戏结束条件
            checkGameOver();
        }

        // ===== 常规赛 =====
        function playRegularGame() {
            gameState.gamesPlayed++;
            
            // 随机选择比赛属性
            const allAttrs = ["jumpShot", "drive", "block", "fastBreak"];
            const gameAttr = allAttrs[Math.floor(Math.random() * 4)];
            const attr = gameState.attributes[gameAttr];
            const attrName = attrNames[gameAttr];
            
            // 掷比赛骰子
            let gameResult = 0;
            for (let i = 0; i < attr.diceCount; i++) {
                gameResult += Math.floor(Math.random() * 6) + 1;
            }
            
            const isWin = gameResult >= gameState.gameTarget;
            const staminaCost = 25;
            gameState.stamina -= staminaCost;
            
            if (isWin) {
                gameState.wins++;
                addLog(`第${gameState.gamesPlayed}场常规赛胜利！${attrName}掷出${gameResult}≥${gameState.gameTarget}，获得1胜场。`, "game");
            } else {
                addLog(`第${gameState.gamesPlayed}场常规赛失利。${attrName}掷出${gameResult}<${gameState.gameTarget}。`, "game");
            }
            
            addLog(`消耗${staminaCost}体力。`, "important");
            
            // 提高比赛难度
            gameState.gameTarget += 1;
            
            // 更新界面
            updateUI();
            
            // 检查常规赛是否结束
            if (gameState.gamesPlayed >= 12) {
                setTimeout(() => {
                    if (gameState.wins >= 6) { // 需要至少6胜
                        endGame(true, `恭喜！常规赛结束，获得${gameState.wins}胜，获得季后赛资格！`);
                    } else {
                        endGame(false, `常规赛结束，获得${gameState.wins}胜，未达到6胜，无缘季后赛。`);
                    }
                }, 1000);
            } else {
                // 比赛后进入下一天
                setTimeout(nextDay, 1500);
            }
        }

        // ===== 界面更新 =====
        function updateUI() {
            // 更新状态栏
            document.getElementById('staminaValue').textContent = `${gameState.stamina}/${gameState.maxStamina}`;
            document.getElementById('moneyValue').textContent = gameState.money;
            document.getElementById('winsValue').textContent = `${gameState.wins}/12`;
            
            // 更新游戏信息
            document.getElementById('currentDay').textContent = gameState.day;
            document.getElementById('gamesProgress').textContent = `${gameState.gamesPlayed}/12`;
            
            // 更新属性
            for (const attrKey in gameState.attributes) {
                const attr = gameState.attributes[attrKey];
                document.getElementById(`level${attrKey.charAt(0).toUpperCase() + attrKey.slice(1)}`).textContent = attr.level;
                document.getElementById(`dice${attrKey.charAt(0).toUpperCase() + attrKey.slice(1)}`).textContent = 
                    `${attr.diceCount}D6`;
            }
        }

        // 添加日志
        function addLog(text, type = "important") {
            const logEl = document.getElementById('eventLog');
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timeStr}] ${text}`;
            
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
            
            // 限制日志数量
            while (logEl.children.length > 20) {
                logEl.removeChild(logEl.firstChild);
            }
        }

        // 检查游戏结束
        function checkGameOver() {
            if (gameState.stamina <= 0) {
                endGame(false, "体力耗尽，因伤退役。");
                return;
            }
            if (gameState.money <= 0) {
                endGame(false, "资金耗尽，无法继续训练。");
                return;
            }
        }

        // 游戏结束
        function endGame(isVictory, message) {
            const modal = document.getElementById('gameOverModal');
            const title = document.getElementById('gameOverTitle');
            const msg = document.getElementById('gameOverMessage');
            
            if (isVictory) {
                title.textContent = "🎉 赛季成功！";
                title.style.color = "#4cd964";
            } else {
                title.textContent = "🏀 赛季结束";
                title.style.color = "#ff3b30";
            }
            
            msg.textContent = message;
            modal.style.display = 'flex';
            
            addLog(`游戏结束: ${message}`, "important");
        }

        // 重新开始
        function restartGame() {
            // 重置游戏状态
            gameState.day = 1;
            gameState.stamina = 100;
            gameState.money = 5000;
            gameState.wins = 0;
            gameState.gamesPlayed = 0;
            gameState.trainingTarget = 4;
            gameState.gameTarget = 3;
            gameState.selectedDecision = null;
            
            // 重置属性
            for (const attrKey in gameState.attributes) {
                const attr = gameState.attributes[attrKey];
                attr.level = 1;
                attr.diceCount = 1;
            }
            
            // 重置界面
            document.getElementById('gameOverModal').style.display = 'none';
            document.getElementById('decisionPanel').style.display = 'block';
            document.getElementById('dicePanel').style.display = 'none';
            
            // 清空日志
            const logEl = document.getElementById('eventLog');
            logEl.innerHTML = '<div class="log-entry log-important">游戏重新开始！</div>';
            
            // 重新开始游戏
            initGame();
        }

        // 页面加载时初始化游戏
        window.onload = initGame;
    </script>
</body>
</html>
