<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA球员创建器 - 像素风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background-color: #1a1a2e;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .header h1 {
            font-size: 2.8rem;
            color: #ff6b35;
            text-shadow: 3px 3px 0 #333;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 1.2rem;
            color: #4fc3f7;
        }
        
        .content {
            display: flex;
            width: 100%;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .creation-panel {
            background-color: #2d3047;
            border-radius: 10px;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            border: 4px solid #444;
        }
        
        .preview-panel {
            background-color: #2d3047;
            border-radius: 10px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            border: 4px solid #444;
        }
        
        .panel-title {
            font-size: 1.8rem;
            color: #4fc3f7;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #4fc3f7;
            padding-bottom: 8px;
        }
        
        .step-container {
            margin-bottom: 25px;
        }
        
        .step-title {
            font-size: 1.4rem;
            color: #ffcc00;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .step-number {
            background-color: #ff6b35;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ddd;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 5px;
            border: 2px solid #555;
            background-color: #3a3d5c;
            color: white;
            font-size: 1.1rem;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .option-item {
            background-color: #3a3d5c;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .option-item:hover {
            transform: translateY(-3px);
            background-color: #4a4d6c;
        }
        
        .option-item.selected {
            border-color: #4fc3f7;
            background-color: #4a4d6c;
            box-shadow: 0 4px 8px rgba(79, 195, 247, 0.3);
        }
        
        .option-item .option-label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffcc00;
        }
        
        .option-item .option-value {
            color: #ddd;
        }
        
        .skin-color-option {
            height: 40px;
            border-radius: 5px;
            margin-top: 5px;
        }
        
        .jersey-option {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            margin-top: 5px;
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
        }
        
        .pixel-player-container {
            width: 200px;
            height: 300px;
            margin: 20px auto;
            position: relative;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .pixel-player {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .player-info {
            background-color: #3a3d5c;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            text-align: center;
            margin-top: 20px;
        }
        
        .player-name {
            font-size: 1.8rem;
            color: #ffcc00;
            margin-bottom: 5px;
        }
        
        .player-details {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 5px;
        }
        
        .player-number {
            font-size: 2.5rem;
            color: #ff6b35;
            font-weight: bold;
        }
        
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background-color: #ff6b35;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #ff824d;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
        }
        
        .btn-secondary {
            background-color: #4fc3f7;
            color: white;
        }
        
        .btn-secondary:hover {
            background-color: #67cbf8;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
        }
        
        .btn:disabled {
            background-color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .hidden {
            display: none;
        }
        
        .basketball-court {
            width: 100%;
            height: 300px;
            background-color: #1e7e34;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin-top: 20px;
            border: 4px solid #8B4513;
        }
        
        .court-line {
            position: absolute;
            background-color: white;
        }
        
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 4px solid white;
            border-radius: 50%;
        }
        
        .free-throw-line {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 4px;
            background-color: white;
        }
        
        .three-point-line {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border: 4px solid white;
            border-radius: 50%;
        }
        
        .hoop {
            position: absolute;
            top: 20%;
            left: 10%;
            width: 40px;
            height: 40px;
            border: 4px solid #ff6b35;
            border-radius: 50%;
        }
        
        .created-player-on-court {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 90px;
            image-rendering: pixelated;
        }
        
        .completion-message {
            text-align: center;
            margin-top: 20px;
            font-size: 1.5rem;
            color: #4fc3f7;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        @media (max-width: 900px) {
            .content {
                flex-direction: column;
                align-items: center;
            }
            
            .creation-panel, .preview-panel {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>NBA 球员创建器</h1>
            <p>创建你的自定义像素风篮球运动员</p>
        </div>
        
        <div class="content">
            <div class="creation-panel">
                <div class="panel-title">创建你的球员</div>
                
                <!-- 步骤1: 基本信息 -->
                <div class="step-container">
                    <div class="step-title">
                        <div class="step-number">1</div>
                        <div>基本信息</div>
                    </div>
                    
                    <div class="input-group">
                        <label for="playerName">球员名称</label>
                        <input type="text" id="playerName" placeholder="输入球员姓名" maxlength="20">
                    </div>
                    
                    <div class="input-group">
                        <label for="jerseyNumber">球衣号码 (0-99)</label>
                        <input type="number" id="jerseyNumber" min="0" max="99" value="23">
                    </div>
                </div>
                
                <!-- 步骤2: 肤色 -->
                <div class="step-container">
                    <div class="step-title">
                        <div class="step-number">2</div>
                        <div>选择肤色</div>
                    </div>
                    
                    <div class="options-container" id="skinColorOptions">
                        <!-- 选项由JavaScript动态生成 -->
                    </div>
                </div>
                
                <!-- 步骤3: 身高 -->
                <div class="step-container">
                    <div class="step-title">
                        <div class="step-number">3</div>
                        <div>选择身高</div>
                    </div>
                    
                    <div class="options-container" id="heightOptions">
                        <!-- 选项由JavaScript动态生成 -->
                    </div>
                </div>
                
                <!-- 步骤4: 体重 -->
                <div class="step-container">
                    <div class="step-title">
                        <div class="step-number">4</div>
                        <div>选择体重</div>
                    </div>
                    
                    <div class="options-container" id="weightOptions">
                        <!-- 选项由JavaScript动态生成 -->
                    </div>
                </div>
                
                <!-- 步骤5: 球衣 -->
                <div class="step-container">
                    <div class="step-title">
                        <div class="step-number">5</div>
                        <div>选择球衣</div>
                    </div>
                    
                    <div class="options-container" id="jerseyOptions">
                        <!-- 选项由JavaScript动态生成 -->
                    </div>
                </div>
                
                <div class="buttons-container">
                    <button id="resetBtn" class="btn btn-secondary">重置</button>
                    <button id="createBtn" class="btn btn-primary">创建球员并开始游戏</button>
                </div>
            </div>
            
            <div class="preview-panel">
                <div class="panel-title">球员预览</div>
                
                <div class="pixel-player-container">
                    <canvas id="pixelPlayerCanvas" width="200" height="300" class="pixel-player"></canvas>
                </div>
                
                <div class="player-info">
                    <div id="previewName" class="player-name">球员名称</div>
                    <div id="previewDetails" class="player-details">身高: -- 体重: --</div>
                    <div id="previewNumber" class="player-number">#00</div>
                </div>
                
                <!-- 篮球场预览 -->
                <div id="courtContainer" class="hidden">
                    <div class="panel-title" style="margin-top: 30px;">篮球场</div>
                    <div class="basketball-court">
                        <div class="court-line center-circle"></div>
                        <div class="court-line free-throw-line"></div>
                        <div class="court-line three-point-line"></div>
                        <div class="hoop"></div>
                        <canvas id="playerOnCourt" width="60" height="90" class="created-player-on-court"></canvas>
                    </div>
                    <div id="completionMessage" class="completion-message hidden">
                        球员创建完成！准备开始游戏...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 球员数据
        const player = {
            name: "",
            jerseyNumber: 23,
            skinColor: 2,
            height: 3,
            weight: 2,
            jersey: 0
        };
        
        // 可选项配置
        const options = {
            skinColors: [
                { id: 0, name: "浅色", color: "#FFDBAC" },
                { id: 1, name: "中等浅色", color: "#E8BD8C" },
                { id: 2, name: "中等", color: "#C19A6B" },
                { id: 3, name: "中等深色", color: "#8B5A2B" },
                { id: 4, name: "深色", color: "#5D4037" }
            ],
            heights: [
                { id: 0, name: "后卫", value: "6'0\"", cm: 183 },
                { id: 1, name: "得分后卫", value: "6'4\"", cm: 193 },
                { id: 2, name: "小前锋", value: "6'7\"", cm: 201 },
                { id: 3, name: "大前锋", value: "6'10\"", cm: 208 },
                { id: 4, name: "中锋", value: "7'1\"", cm: 216 }
            ],
            weights: [
                { id: 0, name: "轻盈", value: "180 lbs", kg: 82 },
                { id: 1, name: "标准", value: "200 lbs", kg: 91 },
                { id: 2, name: "健壮", value: "220 lbs", kg: 100 },
                { id: 3, name: "强壮", value: "240 lbs", kg: 109 },
                { id: 4, name: "重型", value: "260 lbs", kg: 118 }
            ],
            jerseys: [
                { id: 0, name: "湖人", color: "#552583", secondary: "#FDB927", textColor: "white" },
                { id: 1, name: "公牛", color: "#CE1141", secondary: "#000000", textColor: "white" },
                { id: 2, name: "凯尔特人", color: "#007A33", secondary: "#BA9653", textColor: "white" },
                { id: 3, name: "勇士", color: "#1D428A", secondary: "#FFC72C", textColor: "white" },
                { id: 4, name: "热火", color: "#98002E", secondary: "#F9A01B", textColor: "white" }
            ]
        };
        
        // 初始化选项
        function initOptions() {
            // 肤色选项
            const skinContainer = document.getElementById('skinColorOptions');
            options.skinColors.forEach(skin => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.dataset.id = skin.id;
                div.innerHTML = `
                    <div class="option-label">${skin.name}</div>
                    <div class="skin-color-option" style="background-color: ${skin.color};"></div>
                `;
                div.addEventListener('click', () => selectOption('skinColor', skin.id));
                skinContainer.appendChild(div);
            });
            
            // 身高选项
            const heightContainer = document.getElementById('heightOptions');
            options.heights.forEach(height => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.dataset.id = height.id;
                div.innerHTML = `
                    <div class="option-label">${height.name}</div>
                    <div class="option-value">${height.value} (${height.cm}cm)</div>
                `;
                div.addEventListener('click', () => selectOption('height', height.id));
                heightContainer.appendChild(div);
            });
            
            // 体重选项
            const weightContainer = document.getElementById('weightOptions');
            options.weights.forEach(weight => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.dataset.id = weight.id;
                div.innerHTML = `
                    <div class="option-label">${weight.name}</div>
                    <div class="option-value">${weight.value} (${weight.kg}kg)</div>
                `;
                div.addEventListener('click', () => selectOption('weight', weight.id));
                weightContainer.appendChild(div);
            });
            
            // 球衣选项
            const jerseyContainer = document.getElementById('jerseyOptions');
            options.jerseys.forEach(jersey => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.dataset.id = jersey.id;
                div.innerHTML = `
                    <div class="option-label">${jersey.name}</div>
                    <div class="jersey-option" style="background-color: ${jersey.color}; color: ${jersey.textColor}">
                        ${jersey.name}
                    </div>
                `;
                div.addEventListener('click', () => selectOption('jersey', jersey.id));
                jerseyContainer.appendChild(div);
            });
            
            // 设置默认选中
            selectOption('skinColor', player.skinColor, true);
            selectOption('height', player.height, true);
            selectOption('weight', player.weight, true);
            selectOption('jersey', player.jersey, true);
        }
        
        // 选择选项
        function selectOption(type, id, initial = false) {
            player
